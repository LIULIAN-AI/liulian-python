<html lang="en">

    :root {
      --bg: #0d0f14;
      --surface: #161b25;
      --surface2: #1e2535;
      --border: #2a3349;
      --text: #d4daf0;
      --text-dim: #7a8aaa;
      --accent: #4fc3f7;

      --c1: #4fc3f7;
      /* Time Series */
      --c2: #81c784;
      /* Spatio-Temporal */
      --c3: #ff8a65;
      /* LLM for TS */
      --c4: #ce93d8;
      /* LLM for ST */
      --c5: #ffcc02;
      /* Graph Neural Networks */
      --c6: #26c6da;
      /* Hydrology */
      --c7: #f48fb1;
      /* Weather/Earth */
      --c8: #a5d6a7;
      /* Surveys & Benchmarks */
      --c9: #90caf9;
      /* Traffic */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    header h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      max-width: 340px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      outline: none;
    }

    .search-box:focus {
      border-color: var(--accent);
    }

    .search-box::placeholder {
      color: var(--text-dim);
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      background: var(--border);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn.export {
      background: rgba(79, 195, 247, 0.12);
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn.export:hover {
      background: rgba(79, 195, 247, 0.25);
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #canvas {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    .node circle {
      stroke-width: 2;
      cursor: pointer;
      transition: r 0.2s;
    }

    .node text {
      font-family: 'IBM Plex Sans', sans-serif;
      pointer-events: none;
      user-select: none;
    }

    .node:hover circle {
      filter: brightness(1.3);
    }

    .link {
      fill: none;
      stroke: var(--border);
      stroke-width: 1.5;
      opacity: 0.6;
    }

    .link.highlight {
      stroke: var(--accent);
      stroke-width: 2.5;
      opacity: 1;
    }

    /* Tooltip */
    #tooltip {
      position: fixed;
      z-index: 1000;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 12.5px;
      line-height: 1.55;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.15s, transform 0.15s;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    #tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tt-title {
      font-weight: 700;
      font-size: 13.5px;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .tt-row {
      display: flex;
      gap: 6px;
      margin-bottom: 3px;
    }

    .tt-label {
      color: var(--text-dim);
      min-width: 85px;
      flex-shrink: 0;
    }

    .tt-val {
      color: var(--text);
    }

    .tt-link a {
      color: var(--accent);
      text-decoration: none;
    }

    .tt-link a:hover {
      text-decoration: underline;
    }

    .stars {
      color: #ffcc02;
      letter-spacing: 1px;
    }

    .tag {
      display: inline-block;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 3px;
      padding: 1px 6px;
      font-size: 10.5px;
      margin-right: 3px;
    }

    #info-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11.5px;
      color: var(--text-dim);
      pointer-events: none;
    }

    .hidden {
      display: none !important;
    }

    .dimmed {
      opacity: 0.15;
    }

    /* Stats bar */
    .stat-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .stat-badge span {
      color: var(--accent);
    }
  </style>
</head>

    // ============================================================
    // BUILD TREE DATA
    // ============================================================
    function buildTreeData() {
      const catMap = {};
      CATEGORIES.forEach(c => {
        catMap[c.id] = {
          id: c.id, name: `${c.emoji} ${c.label}`,
          color: c.color, children: [], isCategory: true,
          count: PAPERS.filter(p => p.category === c.id).length
        };
      });

      PAPERS.forEach(p => {
        if (catMap[p.category]) {
          catMap[p.category].children.push({
            id: p.id, name: p.title, data: p, isLeaf: true,
            color: catMap[p.category].color
          });
        }
      });

      return {
        id: "root",
        name: "📡 ST / TS / LLM\nResearch Landscape",
        color: "#4fc3f7",
        children: CATEGORIES.map(c => catMap[c.id]).filter(c => c.count > 0),
        isRoot: true
      };
    }

    // ============================================================
    // MINDMAP VISUALIZATION (D3 Tree)
    // ============================================================
    const svg = d3.select("#svg");
    const width = window.innerWidth;
    const height = window.innerHeight - 64;

    const g = svg.append("g");

    // Zoom
    const zoom = d3.zoom()
      .scaleExtent([0.05, 3])
      .on("zoom", (event) => g.attr("transform", event.transform));
    svg.call(zoom);

    function resetZoom() {
      svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.6));
    }

    let root;

    function renderMindmap(filterText = "") {
      g.selectAll("*").remove();

      const treeData = buildTreeData();

      // Apply filter
      if (filterText.trim()) {
        const fl = filterText.toLowerCase();
        treeData.children.forEach(cat => {
          cat.children = cat.children.filter(leaf =>
            leaf.name.toLowerCase().includes(fl) ||
            (leaf.data.authors && leaf.data.authors.toLowerCase().includes(fl)) ||
            (leaf.data.method && leaf.data.method.toLowerCase().includes(fl)) ||
            (leaf.data.summary && leaf.data.summary.toLowerCase().includes(fl)) ||
            (leaf.data.venue && leaf.data.venue.toLowerCase().includes(fl)) ||
            (leaf.data.domain && leaf.data.domain.toLowerCase().includes(fl))
          );
          cat.count = cat.children.length;
        });
      }

      root = d3.hierarchy(treeData);

      // Radial tree layout
      const radius = Math.min(width, height) * 0.95;
      const treeLayout = d3.tree()
        .size([2 * Math.PI, radius / 2])
        .separation((a, b) => (a.parent === b.parent ? 1.2 : 2.5) / a.depth);

      treeLayout(root);

      // Convert to cartesian
      function radialPoint(x, y) {
        return [(y = +y) * Math.cos(x -= Math.PI / 2), y * Math.sin(x)];
      }

      // Links
      const linkGen = d3.linkRadial().angle(d => d.x).radius(d => d.y);

      g.selectAll(".link")
        .data(root.links())
        .join("path")
        .attr("class", "link")
        .attr("d", linkGen)
        .style("stroke", d => d.target.data.color || "#2a3349")
        .style("stroke-width", d => d.source.depth === 0 ? 2 : 1.2)
        .style("opacity", d => d.source.depth === 0 ? 0.6 : 0.35);

      // Nodes
      const node = g.selectAll(".node")
        .data(root.descendants())
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${radialPoint(d.x, d.y)})`)
        .style("cursor", d => d.data.isLeaf ? "pointer" : "pointer");

      // Circles
      node.append("circle")
        .attr("r", d => d.data.isRoot ? 28 : (d.data.isCategory ? 14 : 5))
        .attr("fill", d => {
          if (d.data.isRoot) return "#0d1929";
          if (d.data.isCategory) return d.data.color + "22";
          return d.data.color + "44";
        })
        .attr("stroke", d => d.data.color || "#4fc3f7")
        .attr("stroke-width", d => d.data.isRoot ? 3 : (d.data.isCategory ? 2.5 : 1.5));

      // Stars for importance (leaf nodes)
      node.filter(d => d.data.isLeaf && d.data.data)
        .append("text")
        .attr("dy", "0.35em")
        .attr("text-anchor", "middle")
        .attr("font-size", "6px")
        .attr("fill", "#ffcc02")
        .text(d => {
          const imp = d.data.data.importance || 0;
          return imp >= 5 ? "★★★" : imp >= 4 ? "★★" : imp >= 3 ? "★" : "";
        });

      // Labels
      node.filter(d => !d.data.isLeaf)
        .append("text")
        .attr("dy", "0.35em")
        .attr("x", d => {
          const [x] = radialPoint(d.x, d.y);
          return x > 0 ? (d.data.isRoot ? 0 : 18) : (d.data.isRoot ? 0 : -18);
        })
        .attr("text-anchor", d => {
          if (d.data.isRoot) return "middle";
          const [x] = radialPoint(d.x, d.y);
          return x > 0 ? "start" : "end";
        })
        .style("font-size", d => d.data.isRoot ? "12px" : "11px")
        .style("font-weight", d => d.data.isCategory ? "700" : "400")
        .style("fill", d => d.data.color || "#d4daf0")
        .each(function (d) {
          const lines = d.data.isRoot
            ? d.data.name.split("\n")
            : [d.data.name + (d.data.count ? ` (${d.data.count})` : "")];
          d3.select(this).text(null);
          lines.forEach((line, i) => {
            d3.select(this).append("tspan")
              .attr("x", d.data.isRoot ? 0 : ((() => { const [x] = radialPoint(d.x, d.y); return x > 0 ? 18 : -18; })()))
              .attr("dy", i === 0 ? (lines.length > 1 ? "-0.5em" : "0.35em") : "1.2em")
              .text(line);
          });
        });

      // Leaf labels (short title)
      node.filter(d => d.data.isLeaf)
        .append("text")
        .attr("dy", "-8px")
        .attr("x", d => {
          const [x] = radialPoint(d.x, d.y);
          return x > 0 ? 8 : -8;
        })
        .attr("text-anchor", d => {
          const [x] = radialPoint(d.x, d.y);
          return x > 0 ? "start" : "end";
        })
        .style("font-size", "8.5px")
        .style("fill", "#c0c8e0")
        .text(d => {
          const title = d.data.data.method || d.data.name;
          return title.length > 22 ? title.slice(0, 22) + "…" : title;
        });

      // Year badge on leaves
      node.filter(d => d.data.isLeaf && d.data.data)
        .append("text")
        .attr("dy", "16px")
        .attr("x", d => {
          const [x] = radialPoint(d.x, d.y);
          return x > 0 ? 8 : -8;
        })
        .attr("text-anchor", d => {
          const [x] = radialPoint(d.x, d.y);
          return x > 0 ? "start" : "end";
        })
        .style("font-size", "7.5px")
        .style("fill", "#7a8aaa")
        .text(d => `${d.data.data.year} · ${d.data.data.venue ? d.data.data.venue.split(' ')[0] : ''}`);

      // Hover tooltip
      node.filter(d => d.data.isLeaf)
        .on("mousemove", function (event, d) {
          showTooltip(event, d.data.data);
        })
        .on("mouseleave", () => hideTooltip());

      // Click opens URL
      node.filter(d => d.data.isLeaf)
        .on("click", (event, d) => {
          if (d.data.data && d.data.data.url) {
            window.open(d.data.data.url, "_blank");
          }
        });
    }

    function showTooltip(event, paper) {
      const tt = document.getElementById('tooltip');
      const stars = "★".repeat(paper.importance || 0) + "☆".repeat(5 - (paper.importance || 0));
      const codeLink = paper.code ? `<a href="${paper.code}" target="_blank">GitHub ↗</a>` : "—";
      const paperLink = paper.url ? `<a href="${paper.url}" target="_blank">Paper ↗</a>` : "—";

      tt.innerHTML = `
    <div class="tt-title">${paper.title}</div>
    <div class="tt-row"><span class="tt-label">✦ Method</span><span class="tt-val">${paper.method || "—"}</span></div>
    <div class="tt-row"><span class="tt-label">📅 Year</span><span class="tt-val">${paper.year}</span></div>
    <div class="tt-row"><span class="tt-label">📰 Venue</span><span class="tt-val">${paper.venue || "—"}</span></div>
    <div class="tt-row"><span class="tt-label">👤 Authors</span><span class="tt-val">${paper.authors || "—"}</span></div>
    <div class="tt-row"><span class="tt-label">🔢 Citations</span><span class="tt-val">${paper.citations ? paper.citations + "+" : "—"}</span></div>
    <div class="tt-row"><span class="tt-label">⭐ Importance</span><span class="tt-val stars">${stars}</span></div>
    <div class="tt-row"><span class="tt-label">🌐 Domain</span><span class="tt-val">${paper.domain || "—"}</span></div>
    <div class="tt-row"><span class="tt-label">🎯 Task</span><span class="tt-val">${paper.task || "—"}</span></div>
    <div class="tt-row"><span class="tt-label">📊 Datasets</span><span class="tt-val">${paper.datasets || "—"}</span></div>
    <div class="tt-row" style="margin-top:6px"><span class="tt-label">📝 Summary</span><span class="tt-val">${paper.summary || "—"}</span></div>
    <div class="tt-row tt-link" style="margin-top:6px"><span class="tt-label">🔗 Links</span><span class="tt-val">${paperLink} &nbsp; 💻 ${codeLink}</span></div>
  `;

      const x = Math.min(event.clientX + 16, window.innerWidth - 440);
      const y = Math.min(event.clientY + 10, window.innerHeight - 300);
      tt.style.left = x + "px";
      tt.style.top = y + "px";
      tt.classList.add("visible");
    }

    function hideTooltip() {
      document.getElementById('tooltip').classList.remove("visible");
    }

    // ============================================================
    // LEGEND
    // ============================================================
    const legendEl = document.getElementById('legend');
    CATEGORIES.forEach(c => {
      const el = document.createElement('div');
      el.className = 'legend-item';
      el.innerHTML = `<div class="legend-dot" style="background:${c.color}"></div>${c.emoji} ${c.label.split(' ')[0]}`;
      legendEl.appendChild(el);
    });

    // ============================================================
    // SEARCH
    // ============================================================
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function () {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        renderMindmap(this.value);
        resetZoom();
      }, 300);
    });

    // ============================================================
    // COLLAPSE / EXPAND (simple re-render toggles)
    // ============================================================
    function expandAll() { renderMindmap(document.getElementById('searchInput').value); }
    function collapseAll() { renderMindmap("__NO_MATCH__"); }

    // ============================================================
    // EXPORT FUNCTIONS
    // ============================================================
    function exportSVG() {
      const svgEl = document.getElementById('svg');
      const serializer = new XMLSerializer();
      let source = serializer.serializeToString(svgEl);
      source = '<?xml version="1.0" encoding="UTF-8"?>\n' + source;
      const blob = new Blob([source], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = "research_mindmap.svg"; a.click();
      URL.revokeObjectURL(url);
    }

    function exportPNG() {
      const svgEl = document.getElementById('svg');
      const serializer = new XMLSerializer();
      const svgStr = serializer.serializeToString(svgEl);
      const canvas = document.createElement('canvas');
      canvas.width = window.innerWidth * 2;
      canvas.height = window.innerHeight * 2;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = "#0d0f14";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const img = new Image();
      const blob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const a = document.createElement('a'); a.href = canvas.toDataURL('image/png'); a.download = "research_mindmap.png"; a.click();
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a3' });

      const svgEl = document.getElementById('svg');
      const serializer = new XMLSerializer();
      const svgStr = serializer.serializeToString(svgEl);
      const canvas = document.createElement('canvas');
      canvas.width = 2480; canvas.height = 1754;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = "#0d0f14";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const img = new Image();
      const blob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const imgData = canvas.toDataURL('image/jpeg', 0.92);
        doc.addImage(imgData, 'JPEG', 0, 0, 420, 297);
        doc.save("research_mindmap.pdf");
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }

    function exportMarkdown() {
      let md = "# Research Mindmap: ST / TS / LLM / Hydrology\n\n";
      md += `> **Total papers:** ${PAPERS.length}  |  Generated: ${new Date().toLocaleDateString()}\n\n`;
      md += "---\n\n";

      CATEGORIES.forEach(cat => {
        const papers = PAPERS.filter(p => p.category === cat.id);
        if (papers.length === 0) return;
        md += `## ${cat.emoji} ${cat.label}\n\n`;
        papers.forEach(p => {
          const stars = "★".repeat(p.importance || 0);
          md += `### ${p.method || p.title.slice(0, 40)}\n\n`;
          md += `- **Full Title:** ${p.title}\n`;
          md += `- **Year:** ${p.year}\n`;
          md += `- **Venue:** ${p.venue || "—"}\n`;
          md += `- **Authors:** ${p.authors || "—"}\n`;
          md += `- **Citations:** ${p.citations ? p.citations + "+" : "—"}\n`;
          md += `- **Importance:** ${stars} (${p.importance}/5)\n`;
          md += `- **Domain:** ${p.domain || "—"}\n`;
          md += `- **Task:** ${p.task || "—"}\n`;
          md += `- **Datasets:** ${p.datasets || "—"}\n`;
          md += `- **Summary:** ${p.summary || "—"}\n`;
          md += `- **Paper:** [Link](${p.url || "#"})\n`;
          if (p.code) md += `- **Code:** [GitHub](${p.code})\n`;
          md += "\n";
        });
        md += "---\n\n";
      });

      const blob = new Blob([md], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = "research_mindmap.md"; a.click();
      URL.revokeObjectURL(url);
    }

    // ============================================================
    // INIT
    // ============================================================
    renderMindmap();
    setTimeout(() => {
      svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.55));
    }, 100);

    window.addEventListener('resize', () => {
      renderMindmap(document.getElementById('searchInput').value);
      setTimeout(() => {
        svg.call(zoom.transform, d3.zoomIdentity.translate(window.innerWidth / 2, (window.innerHeight - 64) / 2).scale(0.55));
      }, 100);
    });
  </script>
</body>

</html>
