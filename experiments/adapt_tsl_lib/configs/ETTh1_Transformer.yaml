# ETTh1 Transformer Configuration - Matching TSL exactly
data: ETTh1
root_path: ./dataset/ETT-small/
data_path: ETTh1.csv
features: M
target: OT
freq: h

# Model architecture (matching TSL defaults)
seq_len: 96
label_len: 48
pred_len: 96
enc_in: 7
dec_in: 7
c_out: 7
d_model: 512
n_heads: 8
e_layers: 2
d_layers: 1
d_ff: 2048
factor: 3
dropout: 0.1
activation: gelu
embed: timeF

# Training
train_epochs: 10
batch_size: 32
learning_rate: 0.0001
patience: 3
lradj: type1
use_amp: false

# Float64 mode for TSL matching
use_float64: true
