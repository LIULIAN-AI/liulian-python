# PEMS dataset — PatchTST with entity embedding (add_after_patch)
#
# PEMS traffic sensor datasets (PEMS03/04/07/08).
# PatchTST uses channel-independent patching with entity embeddings
# injected after the patch embedding layer (add_after_patch).
#
# Usage:
#   liulian run experiments/pems/patchtst_config.yaml
#   liulian run experiments/pems/patchtst_config.yaml --data PEMS04
#   liulian run experiments/pems/patchtst_config.yaml --quick_test

# ── General ─────────────────────────────────────────────────────────────
model: patchtst
seed: 2026
quick_test: false
eval_only: false

# ── Data ────────────────────────────────────────────────────────────────
data: PEMS03                      # PEMS03 | PEMS04 | PEMS07 | PEMS08
seq_len: 96
pred_len: 12
features: M
label_len: 0
max_samples: null

# ── Task & mode ─────────────────────────────────────────────────────────
task: forecast
split_mode: multi_channel
scaler: standard
use_current_x: true
use_full_history: false

# ── Gap handling ────────────────────────────────────────────────────────
short_subsequence_method: drop
gap_mode: split
max_mask_consecutive: 10

# ── Noise injection ─────────────────────────────────────────────────────
noise_type: null

# ── Historical target ──────────────────────────────────────────────────
include_historical_y: none
include_historical_predicted_y: false

# ── Entity identifiers ─────────────────────────────────────────────────
identifier_mode: embedding
id_integration: add_after_patch
embedding_size: 10
num_embeddings: null              # Auto-detected from data

# ── Graph / spatial ─────────────────────────────────────────────────────
graph_mode: none
graphlet_num_hops: 1

# ── Model architecture ─────────────────────────────────────────────────
enc_in: null
dec_in: 1
c_out: 1
d_model: 128
d_ff: 256
n_heads: 16
e_layers: 3
dropout: 0.2
patch_len: 16
stride: 8

# ── Training ────────────────────────────────────────────────────────────
train_epochs: 30
batch_size: 32
learning_rate: 0.0001
loss: mse
metrics: rmse,mae,mse
patience: 10
lradj: type1
num_workers: 0
