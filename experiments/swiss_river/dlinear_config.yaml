# Swiss River experiment — DLinear configuration
#
# DLinear operates in multi_channel mode where all stations are
# treated as separate channels in a single multivariate time series.
# Input shape: (B, seq_len, N_stations)  →  Output: (B, pred_len, N_stations)
#
# Usage:
#   liulian run experiments/swiss_river/dlinear_config.yaml
#   liulian run experiments/swiss_river/dlinear_config.yaml --quick_test
#   liulian run experiments/swiss_river/dlinear_config.yaml --pred_len 14

# ── General ─────────────────────────────────────────────────────────────
model: dlinear
seed: 2026
quick_test: false
eval_only: false

# ── Data ────────────────────────────────────────────────────────────────
data: swiss-river-1990            # swiss-river-1990 | swiss-river-2010 | swiss-river-zurich
seq_len: 90                       # Look-back window
pred_len: 7                       # Forecast horizon
features: M
label_len: 0
train_split: 0.8
max_samples: null

# ── Task & mode ─────────────────────────────────────────────────────────
task: forecast
split_mode: multi_channel           # multi_channel mode: all stations as channels
scaler: standard                     # per-feature zero-mean/unit-var (matches TSLib)
use_current_x: true
use_full_history: false

# ── Gap handling ────────────────────────────────────────────────────────
short_subsequence_method: drop
gap_mode: split
max_mask_consecutive: 10

# ── Noise injection ─────────────────────────────────────────────────────
noise_type: null
noise_level: 0.01
noise_probability: 0.01
noise_scale_factor: 5.0

# ── Historical target ──────────────────────────────────────────────────
include_historical_y: none
include_historical_predicted_y: false

# ── Entity identifiers ─────────────────────────────────────────────────
# DLinear default: no entity embedding (channels are already per-station).
# Set to 'embedding' to enable ChannelEntityWrapper.
identifier_mode: one_hot
id_integration: concat_to_x
embedding_size: 10
num_embeddings: null

# ── Graph / spatial ─────────────────────────────────────────────────────
graph_mode: none
graphlet_num_hops: 1

# ── Model architecture ─────────────────────────────────────────────────
enc_in: null                      # Auto-detected (= N_stations)
dec_in: 1
c_out: 1
d_model: 128
d_ff: 256
n_heads: 1
e_layers: 1
d_layers: 0
dropout: 0.0
moving_avg: 25                    # DLinear series decomposition window
individual: true                 # true = per-channel linear; false = shared

# ── Training ────────────────────────────────────────────────────────────
train_epochs: 50
batch_size: 32
learning_rate: 0.0001               # TSLib default for DLinear
loss: mse
metrics: rmse,mae,nse
eval_denorm: true
show_progress: true
patience: 10
lradj: type1                        # TSLib default: halve LR every epoch
num_workers: 0

# ── Logging ─────────────────────────────────────────────────────────────
wandb_project: null
wandb_entity: null
dev_run: false

# ── HPO (Ray Tune) ─────────────────────────────────────────────────────
hpo: True
hpo_num_samples: 200                  # match LSTM; DLinear is cheap
hpo_scheduler: asha
hpo_grace_period: 5
hpo_reduction_factor: 1.5

# ── Visualisation ───────────────────────────────────────────────────────
auto_viz: true
viz_method: mean

# ── Misc (TSLib compat) ────────────────────────────────────────────────
embed: timeF
activation: gelu
output_attention: false
factor: 1
task_name: long_term_forecast
