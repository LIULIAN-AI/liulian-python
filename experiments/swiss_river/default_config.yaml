# Swiss River experiment — default configuration
#
# All keys match the DEFAULT_CONFIG in liulian/config.py.
# Override any key via the CLI:
#   liulian run experiments/swiss_river/default_config.yaml --model timellm --train_epochs 50
#
# Or override via a local YAML that imports/overrides selectively.

# ── General ─────────────────────────────────────────────────────────────
model: lstm
seed: 2026
quick_test: false
eval_only: false

# ── Data ────────────────────────────────────────────────────────────────
data: swiss-river-1990            # swiss-river-1990 | swiss-river-2010 | swiss-river-zurich
seq_len: 90                       # Look-back window (0 → full history)
pred_len: 7                       # Forecast horizon
features: M                       # M | S | MS
label_len: 0
train_split: 0.8
max_samples: null                 # Cap per-split samples (null = unlimited)

# ── Task & mode ─────────────────────────────────────────────────────────
task: forecast                    # forecast | nowcast
split_mode: per_entity              # per_entity | multi_channel | channel_independent
scaler: minmax                    # none | minmax | standard
use_current_x: true
use_full_history: false

# ── Gap handling ────────────────────────────────────────────────────────
short_subsequence_method: drop    # drop | pad
gap_mode: split                   # split | mask_pad
max_mask_consecutive: 10

# ── Noise injection ─────────────────────────────────────────────────────
noise_type: null                  # null | gaussian | gaussian_a | impulse | impulse_a | quantization
noise_level: 0.01
noise_probability: 0.01
noise_scale_factor: 5.0

# ── Historical target ──────────────────────────────────────────────────
include_historical_y: none        # none | gt | predicted
include_historical_predicted_y: false

# ── Entity identifiers ─────────────────────────────────────────────────
identifier_mode: embedding        # none | embedding | embedding_idx | onehot | numeric_id | coordinates | sinusoidal | descriptors
id_integration: concat_to_x      # concat_to_x | add_to_x | add_after_patch (PatchTST+embedding)
id_injection: model              # model (wrapper, per-trial rebuild — canonical) | data (legacy bake-in)
embedding_size: 10
num_embeddings: null              # Auto-detected from dataset if null

# ── Graph / spatial ─────────────────────────────────────────────────────
graph_mode: none                  # none | edge_index | adj_matrix | graphlet_features
graphlet_num_hops: 1

# ── Model architecture ─────────────────────────────────────────────────
enc_in: null                      # Auto-detected from data if null
dec_in: 1
c_out: 1
d_model: 64
d_ff: 32
n_heads: 8
e_layers: 2
d_layers: 1
dropout: 0.0
individual: false
patch_len: 16
stride: 8

# ── LLM backbone (TimeLLM only) ────────────────────────────────────────
llm_model: GPT2
llm_dim: 768
llm_layers: 6
prompt_domain: 0
# cache_dir: auto-set to PROJECT_ROOT/cache

# ── Training ────────────────────────────────────────────────────────────
train_epochs: 30
batch_size: 32  # fixed, NOT HPO-tuned. Was 8 until 2026-06-11 — pre-June swiss-lstm baselines used 8.
learning_rate: 0.001
loss: mse                         # mse | mae | rmse
metrics: rmse,mae,nse
eval_denorm: true
show_progress: true
patience: 10
lradj: none                       # none | constant | type1 | type2 | type3 | PEMS | COS | cosine_warmup | onecycle | step | multistep | exponential | plateau | TST
pct_start: 0.2
cos_T_max: 20
cos_eta_min: 1.0e-8
cos_T_0: 10
cos_T_mult: 2
step_size: 10
gamma: 0.5
milestones: "30,60,90"
sched_patience: 5
sched_factor: 0.5
num_workers: 0

# ── Logging ─────────────────────────────────────────────────────────────
wandb_project: null               # Set to enable wandb (e.g. "swiss-river")
wandb_entity: null
dev_run: false

# ── HPO (Ray Tune) ─────────────────────────────────────────────────────
hpo: true
hpo_num_samples: 200
hpo_scheduler: asha               # asha | none
hpo_grace_period: 5
hpo_reduction_factor: 1.5
hpo_storage_path: null            # Default: artifacts/ray_results
hpo_resources_cpu: 1
hpo_resources_gpu: 0.25
hpo_num_cpus: null                # Auto
hpo_max_concurrent: null
hpo_resume: false
hpo_save_checkpoints: true
hpo_trim_checkpoints: true
hpo_keep_best_n: 10
hpo_trim_best_n: true
hpo_trim_keep_best: true
hpo_trim_keep_last: false
hpo_experiment_name: null         # Extra name tag (appended to auto-generated)
hpo_local_mode: false

# ── Visualisation ───────────────────────────────────────────────────────
auto_viz: true
viz_method: mean                  # mean | median | last | longest_history | best | worst | single

# ── Misc model keys (Time-LLM compat) ──────────────────────────────────
embed: timeF
activation: gelu
output_attention: false
moving_avg: 25
factor: 1
task_name: long_term_forecast
